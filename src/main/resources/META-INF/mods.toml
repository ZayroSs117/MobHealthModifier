[[mods]]
modId="mobhealthmultiplier"
version="1.0.3"
displayName="Hostile Mob Health Multiplier"
displayTest="IGNORE_SERVER_VERSION"
authors="ZayroSs117"
description='''
Server-side Forge mod for Minecraft 1.20.1.
Multiplies the maximum health of hostile mobs and hostile bosses only. Players, animals, villagers and other non-hostile living entities are excluded.
The multiplier is configurable in config/mob-health-multiplier.properties and can be changed live with /mobhealth commands.
'''

[[dependencies.mobhealthmultiplier]]
modId="forge"
mandatory=true
versionRange="[47.2.0,)"
ordering="NONE"
side="SERVER"

[[dependencies.mobhealthmultiplier]]
modId="minecraft"
mandatory=true
versionRange="[1.20.1,1.20.2)"
ordering="NONE"
