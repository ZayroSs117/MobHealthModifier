name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.1.1"

      - name: Build the Forge mod
        run: gradle build --no-daemon

      - name: Upload the server JAR
        uses: actions/upload-artifact@v4
        with:
          name: hostile-mob-health-multiplier-1.0.3
          path: build/libs/hostile-mob-health-multiplier-1.0.3.jar
